<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Projet MELEC — Le prisme</title>

  <meta property="og:title" content="Projet MELEC — Le prisme" />
  <meta property="og:description" content="Trois chansons, une même situation vue par trois facettes : Élève, Prof, Système." />
  <meta property="og:image" content="pochette-melec.png" />
  <meta property="og:type" content="music.song" />

  <style>
    :root{
      --bg:#050507;
      --panel:rgba(10,10,14,.72);
      --text:#f4f4f4;
      --muted:#c7c7c7;
      --accent:#d8b46a;
      --accent2:#8aa4ff;
      --shadow:rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(120deg, rgba(0,0,0,.72), rgba(0,0,0,.34), rgba(0,0,0,.78)),
        url("pochette-melec.png") center/cover no-repeat;
      filter:blur(18px) brightness(.55);
      transform:scale(1.08);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.08), transparent 38%),
        linear-gradient(to bottom, rgba(0,0,0,.1), rgba(0,0,0,.75));
      z-index:-1;
      pointer-events:none;
    }

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    .card{
      width:min(980px, 100%);
      background:var(--panel);
      border:1px solid rgba(255,255,255,.16);
      border-radius:28px;
      box-shadow:0 28px 80px var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .home{
      display:grid;
      grid-template-columns: 1fr 1.05fr;
      gap:0;
    }

    .cover-wrap{
      padding:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.25);
    }

    .cover{
      width:100%;
      max-width:420px;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:50%;
      box-shadow:0 20px 55px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
    }

    .content{
      padding:38px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:18px;
    }

    .label{
      color:var(--accent);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.78rem;
      font-weight:700;
    }

    h1{
      margin:0;
      font-size:clamp(2rem, 5vw, 4.2rem);
      line-height:.95;
    }

    p{
      margin:0;
      color:var(--muted);
      font-size:1.05rem;
      line-height:1.5;
    }

    .buttons{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:12px;
    }

    button, .btn{
      width:100%;
      border:0;
      cursor:pointer;
      border-radius:18px;
      padding:17px 18px;
      font-size:1.12rem;
      font-weight:800;
      letter-spacing:.02em;
      color:#fff;
      background:linear-gradient(135deg, rgba(216,180,106,.95), rgba(138,164,255,.82));
      box-shadow:0 12px 28px rgba(0,0,0,.32);
      transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
    }

    button:hover, .btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.08);
      box-shadow:0 16px 34px rgba(0,0,0,.45);
    }

    button.secondary{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      color:var(--text);
      box-shadow:none;
      margin-top:16px;
    }

    .player-screen{
      display:none;
    }

    .player{
      display:grid;
      grid-template-columns: 0.9fr 1.1fr;
    }

    .player h2{
      margin:0;
      font-size:clamp(2rem, 5vw, 4rem);
      line-height:1;
    }

    audio{
      width:100%;
      margin-top:16px;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
    }

    .small{
      color:rgba(255,255,255,.68);
      font-size:.94rem;
    }

    .fade-in{
      animation:fadeIn .45s ease both;
    }
    .prismelec {
  position: relative;
  display: inline-block;
  overflow: hidden;
}

.prismelec::after {
  content: "PRISMElec";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    110deg,
    transparent 0%,
    transparent 42%,
    rgba(255,255,255,0.75) 50%,
    transparent 58%,
    transparent 100%
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: prismLight 5s ease-in-out infinite;
  pointer-events: none;
}

@keyframes prismLight {
  0% { transform: translateX(-120%); opacity: 0; }
  20% { opacity: 0; }
  45% { opacity: 1; }
  65% { opacity: 0; }
  100% { transform: translateX(120%); opacity: 0; }
}

 .cover.playing {
  animation: spinDisc 6s linear infinite;
}

@keyframes spinDisc {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

    @media (max-width:820px){
      .home, .player{
        grid-template-columns:1fr;
      }

      .content{
        padding:28px;
        text-align:center;
      }

      .cover-wrap{
        padding:24px 24px 0;
      }

      .cover{
        max-width:300px;
      }

      .screen{
        padding:18px;
      }

      .card{
        border-radius:22px;
      }
    }
  </style>
</head>

<body>

  <main id="homeScreen" class="screen fade-in">
    <section class="card home">
      <div class="cover-wrap">
        <img class="cover" src="pochette-melec.png" alt="Pochette du projet MELEC">
      </div>

      <div class="content">
        <div class="label">Projet MELEC</div>
        <h1><span class="blue">PRIS</span><span class="yellow">MElec</span></h1>
        <p>
          Trois chansons racontent la même situation, vue par trois facettes :
          l’élève, le professeur et le système.
        </p>

        <div class="buttons">
          <button onclick="openTrack('eleve')">Élève</button>
          <button onclick="openTrack('prof')">Prof</button>
          <button onclick="openTrack('systeme')">Système</button>
        </div>
      </div>
    </section>
  </main>

  <main id="playerScreen" class="screen player-screen">
    <section class="card player fade-in">
      <div class="cover-wrap">
        <img id="trackCover" class="cover" src="" alt="">
      </div>

      <div class="content">
        <div class="label">Facette du prisme</div>
        <h2 id="trackTitle"></h2>
        <p id="trackText"></p>
        <audio id="audioPlayer" controls preload="metadata"></audio>
        <p class="small">Utilise le bouton retour pour revenir au choix des trois facettes.</p>
        <button class="secondary" onclick="goHome()">← Retour à l’accueil</button>
      </div>
    </section>
  </main>

  <script>
    const tracks = {
      eleve: {
        title: "Élève",
        text: "La situation vue depuis la logique de l’élève.",
        audio: "chanson-eleve.mp3",
        cover: "pochette-eleve.png"
      },
      prof: {
        title: "Prof",
        text: "La situation vue depuis le terrain, la classe et la parole du professeur.",
        audio: "chanson-prof.mp3",
        cover: "pochette-prof.png"
      },
      systeme: {
        title: "Système",
        text: "La situation vue depuis les contraintes, les limites et les mécanismes institutionnels.",
        audio: "chanson-systeme.mp3",
        cover: "pochette-systeme.png"
      }
    };

    const homeScreen = document.getElementById("homeScreen");
    const playerScreen = document.getElementById("playerScreen");
    const audioPlayer = document.getElementById("audioPlayer");
    const trackTitle = document.getElementById("trackTitle");
    const trackText = document.getElementById("trackText");
    const trackCover = document.getElementById("trackCover");
    audioPlayer.onpause = () => trackCover.classList.remove("playing");
audioPlayer.onplay = () => trackCover.classList.add("playing");

    function openTrack(id){
      const t = tracks[id];
      if(!t) return;

      audioPlayer.pause();
      audioPlayer.src = t.audio;
      trackCover.src = t.cover;
      trackCover.alt = "Pochette " + t.title;
      trackTitle.textContent = t.title;
      trackText.textContent = t.text;
      trackCover.classList.add("playing");

      homeScreen.style.display = "none";
      playerScreen.style.display = "flex";

      setTimeout(() => {
        audioPlayer.play().catch(() => {});
      }, 250);
    }

    function goHome(){
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
      playerScreen.style.display = "none";
      homeScreen.style.display = "flex";
      trackCover.classList.remove("playing");
    }
  </script>

</body>
</html>
