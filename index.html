<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Projet MELEC — Le prisme</title>

  <meta property="og:title" content="Projet MELEC — Le prisme" />
  <meta property="og:description" content="Trois chansons, une même situation vue par trois facettes : Élève, Prof, Système." />
  <meta property="og:image" content="pochette-melec.png" />
  <meta property="og:type" content="music.song" />

  <style>
    :root{
      --bg:#050507;
      --panel:rgba(10,10,14,.72);
      --text:#f4f4f4;
      --muted:#c7c7c7;
      --accent:#d8b46a;
      --accent2:#8aa4ff;
      --shadow:rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(120deg, rgba(0,0,0,.72), rgba(0,0,0,.34), rgba(0,0,0,.78)),
        url("pochette-melec.png") center/cover no-repeat;
      filter:blur(18px) brightness(.55);
      transform:scale(1.08);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.08), transparent 38%),
        linear-gradient(to bottom, rgba(0,0,0,.1), rgba(0,0,0,.75));
      z-index:-1;
      pointer-events:none;
    }

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    .card{
      width:min(980px, 100%);
      background:var(--panel);
      border:1px solid rgba(255,255,255,.16);
      border-radius:28px;
      box-shadow:0 28px 80px var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .home{
      display:grid;
      grid-template-columns: 1fr 1.05fr;
    }

    .cover-wrap{
      padding:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.25);
    }

    .cover{
      width:100%;
      max-width:420px;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:50%;
      box-shadow:0 20px 55px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
    }

    .content{
      padding:38px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:18px;
    }

    .label{
      color:var(--accent);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.78rem;
      font-weight:700;
    }

    h1{
      margin:0;
      font-size:clamp(2rem, 5vw, 4.2rem);
      line-height:.95;
    }

    p{
      margin:0;
      color:var(--muted);
      font-size:1.05rem;
      line-height:1.5;
    }

    .buttons{
      display:grid;
      gap:14px;
      margin-top:12px;
    }

    button{
      border:0;
      cursor:pointer;
      border-radius:18px;
      padding:17px;
      font-size:1.12rem;
      font-weight:800;
      color:#fff;
      background:linear-gradient(135deg, rgba(216,180,106,.95), rgba(138,164,255,.82));
    }

    .player-screen{display:none;}

    .player{
      display:grid;
      grid-template-columns: 0.9fr 1.1fr;
    }

    audio{
      width:100%;
      margin-top:16px;
    }

    /* ===== PRISMElec ===== */

    .prismelec{
      font-weight:900;
      letter-spacing:0.03em;
      position:relative;
      display:inline-block;
      overflow:hidden;

      background:linear-gradient(
        90deg,
        #2f8cff 0%,
        #5fa8ff 30%,
        #ffffff 48%,
        #ffe066 52%,
        #ffd21f 75%,
        #e6b800 100%
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .prismelec::after{
      content:"PRISMElec";
      position:absolute;
      inset:0;

      background:linear-gradient(
        110deg,
        transparent 0%,
        transparent 42%,
        rgba(255,255,255,0.75) 50%,
        transparent 58%
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      animation:prismLight 5s ease-in-out infinite;
    }

    @keyframes prismLight{
      0%{transform:translateX(-120%);opacity:0;}
      45%{opacity:1;}
      100%{transform:translateX(120%);opacity:0;}
    }

    /* ===== DISQUE ===== */

    .cover.playing{
      animation:spinDisc 6s linear infinite;
    }

    @keyframes spinDisc{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

  </style>
</head>

<body>

<main id="homeScreen" class="screen">
  <section class="card home">
    <div class="cover-wrap">
      <img class="cover" src="pochette-melec.png">
    </div>

    <div class="content">
      <div class="label">Projet MELEC</div>
      <h1 class="prismelec">PRISMElec</h1>

      <p>Trois chansons racontent la même situation.</p>

      <div class="buttons">
        <button onclick="openTrack('eleve')">Élève</button>
        <button onclick="openTrack('prof')">Prof</button>
        <button onclick="openTrack('systeme')">Système</button>
      </div>
    </div>
  </section>
</main>

<main id="playerScreen" class="screen player-screen">
  <section class="card player">
    <div class="cover-wrap">
      <img id="trackCover" class="cover">
    </div>

    <div class="content">
      <h2 id="trackTitle"></h2>
      <audio id="audioPlayer" controls></audio>
      <button onclick="goHome()">← Retour</button>
    </div>
  </section>
</main>

<script>
const tracks={
  eleve:{title:"Élève",audio:"chanson-eleve.mp3",cover:"pochette-eleve.png"},
  prof:{title:"Prof",audio:"chanson-prof.mp3",cover:"pochette-prof.png"},
  systeme:{title:"Système",audio:"chanson-systeme.mp3",cover:"pochette-systeme.png"}
};

const home=document.getElementById("homeScreen");
const player=document.getElementById("playerScreen");
const audio=document.getElementById("audioPlayer");
const cover=document.getElementById("trackCover");
const title=document.getElementById("trackTitle");

audio.onplay=()=>cover.classList.add("playing");
audio.onpause=()=>cover.classList.remove("playing");

function openTrack(id){
  const t=tracks[id];
  audio.src=t.audio;
  cover.src=t.cover;
  title.textContent=t.title;

  home.style.display="none";
  player.style.display="flex";

  setTimeout(()=>audio.play(),200);
}

function goHome(){
  audio.pause();
  audio.currentTime=0;
  cover.classList.remove("playing");

  player.style.display="none";
  home.style.display="flex";
}
</script>

</body>
</html>
